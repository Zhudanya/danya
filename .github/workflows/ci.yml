name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-scripts && bun run node_modules/@vscode/ripgrep/lib/postinstall.js || true
        env:
          DANYA_SKIP_BINARY_DOWNLOAD: "1"

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test
        continue-on-error: true

      - name: Build
        run: bun run build
